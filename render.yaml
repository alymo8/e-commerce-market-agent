services:
  - type: web
    name: market-agent-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    dockerCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ENABLE_LIVE_SCRAPE
        value: "false"
  - type: web
    name: market-agent-ui
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: streamlit run app/ui/streamlit_app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: market-agent-api
          property: host
